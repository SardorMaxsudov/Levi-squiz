<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levi Quiz - Bilimingizni Sinang</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 { color: var(--dark); margin-bottom: 1.5rem; }
        h2 { color: var(--primary); }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover { background-color: #357abd; transform: translateY(-2px); }
        .btn-secondary { background-color: var(--secondary); }
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }

        .screen { display: none; }
        .active { display: block; }

        #question-container { text-align: left; margin: 20px 0; }
        .option-btn {
            background-color: white;
            color: var(--dark);
            border: 2px solid #ddd;
            text-align: left;
        }
        .option-btn:hover { background-color: #f8f9fa; border-color: var(--primary); }
        .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background-color: var(--danger) !important; color: white; border-color: var(--danger); }

        #leaderboard-list {
            list-style: none;
            padding: 0;
            text-align: left;
        }
        #leaderboard-list li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .quiz-card {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .quiz-card:hover { border-color: var(--primary); background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-screen" class="screen active">
        <h1>Levi Quiz</h1>
        <div id="quiz-list">
            <div class="quiz-card" onclick="startQuiz('Matematika')"><h3>Matematika</h3></div>
            <div class="quiz-card" onclick="startQuiz('Tarix')"><h3>Tarix</h3></div>
            <div class="quiz-card" onclick="startQuiz('Informatika')"><h3>Informatika</h3></div>
        </div>
        <hr>
        <button class="btn btn-secondary" onclick="showLeaderboard(true)">Global Reyting</button>
    </div>

    <div id="quiz-screen" class="screen">
        <h2 id="quiz-title">Test</h2>
        <div id="question-container">
            <h3 id="question-text">Savol yuklanmoqda...</h3>
            <div id="options-container"></div>
        </div>
        <p>Savol: <span id="current-q">1</span>/<span id="total-q">10</span></p>
    </div>

    <div id="result-screen" class="screen">
        <h2>Natija</h2>
        <p id="score-text"></p>
        <input type="text" id="user-name" placeholder="Ismingizni kiriting">
        <button class="btn btn-success" onclick="handleSaveScore()">Reytingga qo'shish</button>
        <button class="btn" onclick="goToMain()">Asosiy menyu</button>
    </div>

    <div id="leaderboard-screen" class="screen">
        <h2 id="leaderboard-title">Reyting</h2>
        <ul id="leaderboard-list"></ul>
        <button class="btn" onclick="goToMain()">Orqaga</button>
    </div>
</div>

<script>
    const questionsData = {
        'Matematika': [
            { q: "2 + 2 = ?", options: ["3", "4", "5", "6"], correct: 1 },
            { q: "15 * 3 = ?", options: ["35", "40", "45", "50"], correct: 2 }
        ],
        'Tarix': [
            { q: "Amir Temur nechanchi yilda tug'ilgan?", options: ["1336", "1342", "1405", "1299"], correct: 0 }
        ],
        'Informatika': [
            { q: "HTML nima?", options: ["Dasturlash tili", "Belgilash tili", "Brauzer", "O'yin"], correct: 1 }
        ]
    };

    let currentQuiz = [];
    let currentQIndex = 0;
    let score = 0;
    let selectedQuizTitle = "";

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startQuiz(title) {
        selectedQuizTitle = title;
        currentQuiz = questionsData[title];
        currentQIndex = 0;
        score = 0;
        document.getElementById('quiz-title').innerText = title;
        document.getElementById('total-q').innerText = currentQuiz.length;
        showQuestion();
        showScreen('quiz-screen');
    }

    function showQuestion() {
        const q = currentQuiz[currentQIndex];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('current-q').innerText = currentQIndex + 1;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            container.appendChild(btn);
        });
    }

    function checkAnswer(idx) {
        const correct = currentQuiz[currentQIndex].correct;
        const btns = document.querySelectorAll('.option-btn');
        
        if(idx === correct) {
            btns[idx].classList.add('correct');
            score++;
        } else {
            btns[idx].classList.add('wrong');
            btns[correct].classList.add('correct');
        }

        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        
        setTimeout(() => {
            currentQIndex++;
            if(currentQIndex < currentQuiz.length) {
                showQuestion();
            } else {
                finishQuiz();
            }
        }, 1500);
    }

    function finishQuiz() {
        document.getElementById('score-text').innerText = `Siz ${currentQuiz.length} ta savoldan ${score} ta to'g'ri topdingiz.`;
        showScreen('result-screen');
    }

    function handleSaveScore() {
        const name = document.getElementById('user-name').value;
        if(!name) return alert("Ismingizni kiriting!");
        
        const date = new Date().toLocaleString();
        const entry = { name, score, total: currentQuiz.length, date, quizTitle: selectedQuizTitle };

        // 1. Shu test uchun alohida saqlash
        let specificKey = `leaderboard_${selectedQuizTitle}`;
        let specificDb = JSON.parse(localStorage.getItem(specificKey)) || [];
        specificDb.push(entry);
        specificDb.sort((a, b) => b.score - a.score);
        localStorage.setItem(specificKey, JSON.stringify(specificDb.slice(0, 10))); // Top 10

        // 2. Global saqlash
        let globalDb = JSON.parse(localStorage.getItem('global_leaderboard')) || [];
        globalDb.push(entry);
        globalDb.sort((a, b) => b.score - a.score);
        localStorage.setItem('global_leaderboard', JSON.stringify(globalDb.slice(0, 20))); // Top 20

        showLeaderboard(false); // Faqat shu test reytingini ko'rsatish
    }

    function showLeaderboard(isGlobal = false) {
        const list = document.getElementById('leaderboard-list');
        const title = document.getElementById('leaderboard-title');
        list.innerHTML = '';

        let data;
        if(isGlobal) {
            data = JSON.parse(localStorage.getItem('global_leaderboard')) || [];
            title.innerText = "Global Reyting (Barcha testlar)";
        } else {
            data = JSON.parse(localStorage.getItem(`leaderboard_${selectedQuizTitle}`)) || [];
            title.innerText = `${selectedQuizTitle} Reytingi`;
        }

        if(data.length === 0) {
            list.innerHTML = '<li>Hali natijalar yo\'q</li>';
        } else {
            data.forEach((e, i) => {
                const li = document.createElement('li');
                const info = isGlobal ? `<br><small style="color:#777">Test: ${e.quizTitle}</small>` : '';
                li.innerHTML = `
                    <span>${i+1}. ${e.name}${info}</span>
                    <span><b>${e.score}/${e.total}</b></span>
                `;
                list.appendChild(li);
            });
        }
        showScreen('leaderboard-screen');
    }

    function goToMain() {
        showScreen('main-screen');
        document.getElementById('user-name').value = '';
    }
</script>

</body>
</html>
